name: Bug report
description: Something is broken or not behaving the way you expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in what you can.

        If this is a security vulnerability, do not file it here. Email hello@hain.sh instead. See our [security policy](https://github.com/hainlabs/hain-releases/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem. What did you expect, and what happened instead?
      placeholder: When I ..., Hain ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we make it happen?
      placeholder: |
        1. Open Hain
        2. Create a space
        3. ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Other (note it below)
    validations:
      required: true
  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - Apple Silicon (arm64)
        - Intel (x64)
        - Linux x64
        - Linux arm64
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: format
    attributes:
      label: Install format
      options:
        - macOS DMG
        - Linux AppImage
        - Linux deb
        - Terminal (CLI or TUI)
        - Other (note it below)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Hain version
      description: Find this in the About dialog, or run `hain --version` for the terminal tools.
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any error text, the crash log path, or screenshots. This will be formatted as code, so no backticks are needed.
      render: shell
    validations:
      required: false
