name: Feature request
description: Suggest an idea or an improvement.
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Tell us what you are trying to do, and we will take it from there.
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the problem or the workflow you wish were easier. Focus on the goal, not just one solution.
      placeholder: I want to ...
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: If you have a specific idea for how it could work, describe it here.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Anything you have tried or considered?
      description: Workarounds you use today, or other tools that do this well.
    validations:
      required: false
